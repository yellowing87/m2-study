<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta charset="UTF-8">
    <title>M2 d/dx Speed Drill + Cat</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root { --bg: #020617; --card: #0f172a; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Times New Roman', serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 2rem; border-radius: 1.5rem; border: 1px solid #1e293b; width: 90%; max-width: 650px; text-align: center; }
        .timer { font-size: 3rem; font-family: monospace; color: var(--accent); margin: 10px 0; font-variant-numeric: tabular-nums; }
        .cat-display { font-size: 3rem; margin-bottom: 10px; height: 60px; }
        .stats-bar { display: flex; justify-content: center; gap: 20px; font-family: sans-serif; margin-bottom: 15px; }
        .question-box { min-height: 120px; background: rgba(255,255,255,0.03); border-radius: 1rem; margin: 1rem 0; padding: 1.5rem; overflow-x: auto; }
        .answer { display: none; margin-top: 1rem; color: #cbd5e1; background: rgba(34, 197, 94, 0.1); padding: 10px; border-radius: 8px; }
        .btn-next { background: var(--accent); color: #000; padding: 15px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-reveal { background: transparent; color: var(--text); border: 1px solid #334155; padding: 15px 25px; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        #scoreButtons { display: none; justify-content: center; gap: 10px; margin: 15px 0; }
        .btn-score { padding: 12px 25px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        #solved-count { font-size: 0.9rem; color: #64748b; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="catEmoji" class="cat-display">🐾</div>
    <div id="category" style="color: var(--accent); font-size: 0.8rem;">READY?</div>
    <div class="timer" id="display">00.00</div>

    <div class="stats-bar">
        <span id="scoreDisplay">Score: 0</span>
        <span id="streakDisplay" style="font-weight: bold;">Streak: 0x</span>
    </div>

    <div class="question-box">
        <div id="questionText">\[ \text{Click NEXT to begin training} \]</div>
        <div class="answer" id="answerText"></div>
    </div>

    <div id="scoreButtons">
        <button class="btn-score" onclick="markIncorrect()" style="background: #ff4444;">Wrong</button>
        <button class="btn-score" onclick="markCorrect()" style="background: #00c851;">Correct</button>
    </div>

    <div id="controls">
        <button class="btn-next" onclick="nextQuestion()">NEXT QUESTION</button>
        <button class="btn-reveal" id="revealBtn" onclick="toggleAnswer()" disabled>SHOW ANSWER</button>
    </div>
    
    <div id="solved-count">Solved: 0</div>
</div>

<script>
    const questions = [
        { q: "y = x^2 \\cos(3x)", a: "y' = -3x^2 \\sin(3x) + 2x \\cos(3x)", cat: "Product" },
        { q: "y = e^{2x} \\ln(x)", a: "y' = \\frac{e^{2x}}{x} + 2e^{2x} \\ln(x)", cat: "Product" },
        { q: "y = \\sin(x) \\tan(2x)", a: "y' = 2\\sin(x) \\sec^2(2x) + \\cos(x) \\tan(2x)", cat: "Product" },
        { q: "y = x^4 e^{-x}", a: "y' = -x^4 e^{-x} + 4x^3 e^{-x}", cat: "Product" },
        { q: "y = \\ln(3x) \\cos(x)", a: "y' = -\\ln(3x) \\sin(x) + \\frac{\\cos(x)}{x}", cat: "Product" },
        { q: "y = \\sqrt{x} e^{5x}", a: "y' = 5\\sqrt{x} e^{5x} + \\frac{e^{5x}}{2\\sqrt{x}}", cat: "Product" },
        { q: "y = (x^3+1) \\sin(x)", a: "y' = (x^3+1) \\cos(x) + 3x^2 \\sin(x)", cat: "Product" },
        { q: "y = \\tan^{-1}(x) e^{x}", a: "y' = \\frac{e^x}{1+x^2} + e^x \\tan^{-1}(x)", cat: "Product" },
        { q: "y = x \\ln(x^2)", a: "y' = x(\\frac{2}{x}) + \\ln(x^2)", cat: "Product" },
        { q: "y = e^{x} \\cos^2(x)", a: "y' = -2e^x \\cos(x) \\sin(x) + e^x \\cos^2(x)", cat: "Product" },
        { q: "y = \\frac{e^{4x}}{x^3}", a: "y' = \\frac{4x^3 e^{4x} - 3x^2 e^{4x}}{x^6}", cat: "Quotient" },
        { q: "y = \\frac{\\ln(x)}{x+2}", a: "y' = \\frac{(x+2)/x - \\ln(x)}{(x+2)^2}", cat: "Quotient" },
        { q: "y = \\frac{\\sin(2x)}{\\cos(x)}", a: "y' = \\frac{2\\cos(2x)\\cos(x) + \\sin(2x)\\sin(x)}{\\cos^2(x)}", cat: "Quotient" },
        { q: "y = \\frac{x^2}{e^{3x}}", a: "y' = \\frac{2x e^{3x} - 3x^2 e^{3x}}{e^{6x}}", cat: "Quotient" },
        { q: "y = \\frac{\\tan(x)}{\\sqrt{x}}", a: "y' = \\frac{\\sqrt{x} \\sec^2(x) - \\tan(x)/(2\\sqrt{x})}{x}", cat: "Quotient" },
        { q: "y = \\frac{\\cos(3x)}{x}", a: "y' = \\frac{-3x \\sin(3x) - \\cos(3x)}{x^2}", cat: "Quotient" },
        { q: "y = \\frac{e^{-x}}{\\sin(x)}", a: "y' = \\frac{-e^{-x} \\sin(x) - e^{-x} \\cos(x)}{\\sin^2(x)}", cat: "Quotient" },
        { q: "y = \\frac{\\ln(2x)}{e^x}", a: "y' = \\frac{e^x/x - e^x \\ln(2x)}{e^{2x}}", cat: "Quotient" },
        { q: "y = \\frac{x+1}{\\tan(x)}", a: "y' = \\frac{\\tan(x) - (x+1)\\sec^2(x)}{\\tan^2(x)}", cat: "Quotient" },
        { q: "y = \\frac{\\sin^{-1}(x)}{x^2}", a: "y' = \\frac{x^2/\\sqrt{1-x^2} - 2x \\sin^{-1}(x)}{x^4}", cat: "Quotient" },
        { q: "y = \\cos(e^{x^2})", a: "y' = -2x e^{x^2} \\sin(e^{x^2})", cat: "Chain" },
        { q: "y = \\ln(\\sin 4x)", a: "y' = \\frac{4\\cos(4x)}{\\sin(4x)}", cat: "Chain" },
        { q: "y = e^{\\tan^{-1}(2x)}", a: "y' = \\frac{2e^{\\tan^{-1}(2x)}}{1+4x^2}", cat: "Chain" },
        { q: "y = (3x^2-5)^4", a: "y' = 24x(3x^2-5)^3", cat: "Chain" },
        { q: "y = \\sqrt{\\tan x}", a: "y' = \\frac{\\sec^2(x)}{2\\sqrt{\\tan x}}", cat: "Chain" },
        { q: "y = \\sin^4(x)", a: "y' = 4\\sin^3(x) \\cos(x)", cat: "Chain" },
        { q: "y = \\ln^2(3x)", a: "y' = \\frac{2\\ln(3x)}{x}", cat: "Chain" },
        { q: "y = \\exp(\\cos 2x)", a: "y' = -2\\sin(2x) e^{\\cos 2x}", cat: "Chain" },
        { q: "y = \\tan(x^3)", a: "y' = 3x^2 \\sec^2(x^3)", cat: "Chain" },
        { q: "y = \\sqrt{e^x + 1}", a: "y' = \\frac{e^x}{2\\sqrt{e^x+1}}", cat: "Chain" },
        { q: "y = \\sin(\\ln(\\cos x))", a: "y' = -\\tan(x) \\cos(\\ln(\\cos x))", cat: "Triple" },
        { q: "y = e^{\\sqrt{\\sin x}}", a: "y' = \\frac{\\cos(x) e^{\\sqrt{\\sin x}}}{2\\sqrt{\\sin x}}", cat: "Triple" },
        { q: "y = \\ln(\\tan^2 x)", a: "y' = \\frac{2\\sec^2(x)}{\\tan(x)}", cat: "Triple" },
        { q: "y = \\cos^2(e^{3x})", a: "y' = -6e^{3x} \\cos(e^{3x}) \\sin(e^{3x})", cat: "Triple" },
        { q: "y = \\sqrt{1 + \\ln x}", a: "y' = \\frac{1}{2x\\sqrt{1+\\ln x}}", cat: "Triple" },
        { q: "y = \\tan(\\sin 2x)", a: "y' = 2\\cos(2x) \\sec^2(\\sin 2x)", cat: "Triple" },
        { q: "y = \\ln(x^2 e^{x})", a: "y' = \\frac{2x e^x + x^2 e^x}{x^2 e^x}", cat: "Log-Prod" },
        { q: "y = e^{x^2} \\sin(x^2)", a: "y' = 2x e^{x^2} \\sin(x^2) + 2x e^{x^2} \\cos(x^2)", cat: "Prod-Chain" },
        { q: "y = \\sin^{-1}(\\sqrt{x})", a: "y' = \\frac{1}{2\\sqrt{x}\\sqrt{1-x}}", cat: "Inverse" },
        { q: "y = \\cos(\\ln^2 x)", a: "y' = -\\frac{2\\ln(x) \\sin(\\ln^2 x)}{x}", cat: "Triple" },
        { q: "y = e^{-3x}, \\text{find } y''", a: "y'' = 9e^{-3x}", cat: "2nd Deriv" },
        { q: "y = \\sin(4x), \\text{find } y''", a: "y'' = -16\\sin(4x)", cat: "2nd Deriv" },
        { q: "y = \\ln(x^3), \\text{find } y''", a: "y'' = -3/x^2", cat: "2nd Deriv" },
        { q: "y = x e^{2x}, \\text{find } y''", a: "y'' = 4x e^{2x} + 4e^{2x}", cat: "2nd Deriv" },
        { q: "y = \\frac{1}{x}, \\text{find } y''", a: "y'' = 2/x^3", cat: "2nd Deriv" },
        { q: "y = \\tan(x), \\text{find } y''", a: "y'' = 2\\sec^2(x) \\tan(x)", cat: "2nd Deriv" },
        { q: "y = \\cos^2(x), \\text{find } y' \\text{ (first step)}", a: "y' = -2\\sin(x) \\cos(x)", cat: "Chain" },
        { q: "y = \\sqrt{2x+1}, \\text{find } y''", a: "y'' = -4/(2x+1)^{3/2}", cat: "2nd Deriv" },
        { q: "y = x^2 \\ln x, \\text{find } y''", a: "y'' = 2\\ln(x) + 3", cat: "2nd Deriv" },
        { q: "y = e^{x^2}, \\text{find } y' \\text{ (first step)}", a: "y' = 2x e^{x^2}", cat: "Chain" }
    ];

    let startTime, timerInterval, solvedCount = 0;
    let score = 0, streak = 0, currentElapsed = 0;
    let remainingQuestions = [];
    const cats = ["🐈", "😻", "😼", "😽", "😾", "🐆", "🐅", "🐈‍⬛", "🦁", "🙀", "🐾", "🧶"];

    function updateUI() {
        document.getElementById('scoreDisplay').innerText = `Score: ${score}`;
        document.getElementById('streakDisplay').innerText = `Streak: ${streak}x`;
        document.getElementById('streakDisplay').style.color = streak > 5 ? "orange" : "white";
        document.getElementById('solved-count').textContent = "Solved: " + solvedCount;
    }

    function nextQuestion() {
        if (remainingQuestions.length === 0) {
            remainingQuestions = [...questions];
            if (solvedCount > 0) alert("Set cleared! Restarting.");
        }

        const idx = Math.floor(Math.random() * remainingQuestions.length);
        const currentQ = remainingQuestions[idx];
        remainingQuestions.splice(idx, 1);

        document.getElementById("questionText").innerHTML = "\\[ " + currentQ.q + " \\]";
        document.getElementById("answerText").innerHTML = "\\[ " + currentQ.a + " \\]";
        document.getElementById("category").textContent = currentQ.cat + " (Left: " + remainingQuestions.length + ")";
        document.getElementById("catEmoji").textContent = cats[solvedCount % cats.length];
        
        document.getElementById("answerText").style.display = "none";
        document.getElementById("scoreButtons").style.display = "none";
        document.getElementById("revealBtn").disabled = false;
        document.getElementById("display").style.color = "var(--accent)";

        if (window.MathJax) MathJax.typesetPromise();

        clearInterval(timerInterval);
        startTime = Date.now();
        timerInterval = setInterval(() => {
            currentElapsed = (Date.now() - startTime) / 1000;
            document.getElementById("display").textContent = currentElapsed.toFixed(2);
        }, 10);
    }

    function toggleAnswer() {
        clearInterval(timerInterval);
        document.getElementById("answerText").style.display = "block";
        document.getElementById("scoreButtons").style.display = "flex";
        document.getElementById("revealBtn").disabled = true;
        if (window.MathJax) MathJax.typesetPromise();
    }

    function markCorrect() {
        streak++;
        let bonus = currentElapsed < 5 ? 2 : 1;
        score += 10 * streak * bonus;
        solvedCount++;
        updateUI();
        nextQuestion();
    }

    function markIncorrect() {
        streak = 0;
        updateUI();
        nextQuestion();
    }
</script>
</body>
</html>
