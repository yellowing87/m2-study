<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta charset="UTF-8">
    <title>M2 Speedrun Mastery</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --text: #f8fafc; --accent: #38bdf8; --correct: #00c851; --wrong: #ff4444; }
        body { font-family: 'Times New Roman', serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { background: var(--card); padding: 2rem; border-radius: 1.5rem; border: 1px solid #1e293b; width: 90%; max-width: 600px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .timer { font-size: 3.5rem; font-family: monospace; color: var(--accent); margin: 5px 0; }
        .mastery-text { font-family: sans-serif; font-size: 0.75rem; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .progress-bar { font-family: sans-serif; font-size: 1.2rem; font-weight: bold; color: #f8fafc; margin-bottom: 10px; }
        .question-box { min-height: 140px; background: rgba(255,255,255,0.02); border-radius: 1rem; margin: 1rem 0; padding: 1.5rem; border: 1px solid #334155; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .answer { display: none; margin-top: 1rem; color: #cbd5e1; background: rgba(34, 197, 94, 0.1); padding: 15px; border-radius: 8px; border-left: 4px solid var(--correct); width: 90%; }
        .btn-main { background: var(--accent); color: #000; padding: 18px 30px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; width: 100%; transition: transform 0.1s; }
        .btn-reveal { background: transparent; color: var(--text); border: 1px solid #334155; padding: 15px 30px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        #scoreButtons { display: none; justify-content: center; gap: 15px; margin: 20px 0; width: 100%; }
        .btn-score { padding: 15px 20px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; flex: 1; }
        #leaderboard { margin-top: 25px; padding-top: 20px; border-top: 1px solid #1e293b; text-align: left; }
        .lb-item { display: flex; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.03); margin-bottom: 4px; border-radius: 6px; font-family: sans-serif; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="masteryDisplay" class="mastery-text">Mastery: 0/0 Questions</div>
    <div class="progress-bar" id="progressDisplay">M2 SPEEDRUN</div>
    <div class="timer" id="display">00.00</div>

    <div class="question-box">
        <div id="questionText">\[ \text{Press START to begin} \]</div>
        <div class="answer" id="answerText"></div>
    </div>

    <div id="scoreButtons">
        <button class="btn-score" onclick="handleResult(false)" style="background: var(--wrong);">WRONG (+5s)</button>
        <button class="btn-score" onclick="handleResult(true)" style="background: var(--correct);">CORRECT</button>
    </div>

    <div id="controls">
        <button class="btn-main" id="startBtn" onclick="startSprint()">START 10-Q SPRINT</button>
        <button class="btn-reveal" id="revealBtn" onclick="toggleAnswer()" style="display:none;">SHOW ANSWER</button>
    </div>

    <div id="leaderboard">
        <div style="color:var(--accent); font-size:0.8rem; text-align:center; margin-bottom:10px; font-family:sans-serif;">🏆 TOP TIMES</div>
        <div id="leaderboardList"></div>
    </div>
</div>

<script>
    // ADD YOUR QUESTIONS HERE - Give each a unique ID!
    const pool = [
    { id: 1, q: "y = x^2 \\cos(3x)", a: "y' = -3x^2 \\sin(3x) + 2x \\cos(3x)" },
    { id: 2, q: "y = e^{2x} \\ln(x)", a: "y' = \\frac{e^{2x}}{x} + 2e^{2x} \\ln(x)" },
    { id: 3, q: "y = \\sin(x) \\tan(2x)", a: "y' = 2\\sin(x) \\sec^2(2x) + \\cos(x) \\tan(2x)" },
    { id: 4, q: "y = \\frac{e^{4x}}{x^3}", a: "y' = \\frac{4x^3 e^{4x} - 3x^2 e^{4x}}{x^6}" },
    { id: 5, q: "y = \\cos(e^{x^2})", a: "y' = -2x e^{x^2} \\sin(e^{x^2})" },
    { id: 6, q: "y = \\ln(\\sin 4x)", a: "y' = 4 \\cot(4x)" },
    { id: 7, q: "y = \\sin(\\ln(\\cos x))", a: "y' = -\\tan(x) \\cos(\\ln(\\cos x))" },
    { id: 8, q: "y = e^{\\sqrt{\\sin x}}", a: "y' = \\frac{\\cos x e^{\\sqrt{\\sin x}}}{2\\sqrt{\\sin x}}" },
    { id: 9, q: "y = x e^{2x}, y''?", a: "y'' = 4x e^{2x} + 4e^{2x}" },
    { id: 10, q: "y = \\tan(x^3)", a: "y' = 3x^2 \\sec^2(x^3)" },
    { id: 11, q: "y = \\ln^2(3x)", a: "y' = \\frac{2\\ln(3x)}{x}" },
    { id: 12, q: "y = \\sqrt{2x+1}, y''?", a: "y'' = -4(2x+1)^{-3/2}" },
    { id: 13, q: "y = \\sec(5x)", a: "y' = 5 \\sec(5x) \\tan(5x)" },
    { id: 14, q: "y = \\cot(x^2)", a: "y' = -2x \\csc^2(x^2)" },
    { id: 15, q: "y = \\ln(x^2 + 5x)", a: "y' = \\frac{2x+5}{x^2+5x}" },
    { id: 16, q: "y = (2x-3)^5", a: "y' = 10(2x-3)^4" },
    { id: 17, q: "y = \\arcsin(3x)", a: "y' = \\frac{3}{\\sqrt{1-9x^2}}" },
    { id: 18, q: "y = \\arctan(x^2)", a: "y' = \\frac{2x}{1+x^4}" },
    { id: 19, q: "y = 5^{x}", a: "y' = 5^x \\ln 5" },
    { id: 20, q: "y = \\log_{10}(x)", a: "y' = \\frac{1}{x \\ln 10}" },
    { id: 21, q: "y = \\frac{1}{\\sin x}", a: "y' = -\\csc x \\cot x" },
    { id: 22, q: "y = \\sqrt[3]{x^2+1}", a: "y' = \\frac{2x}{3(x^2+1)^{2/3}}" },
    { id: 23, q: "y = e^{\\cos x}", a: "y' = -\\sin x e^{\\cos x}" },
    { id: 24, q: "y = x^x, \\text{find } \\frac{dy}{dx}", a: "y' = x^x(1 + \\ln x)" },
    { id: 25, q: "y = \\frac{\\ln x}{x^2}", a: "y' = \\frac{1-2\\ln x}{x^3}" },
    { id: 26, q: "y = \\sin^3(2x)", a: "y' = 6 \\sin^2(2x) \\cos(2x)" },
    { id: 27, q: "y = \\cos^4(x)", a: "y' = -4 \\cos^3(x) \\sin(x)" },
    { id: 28, q: "y = \\ln(\\sec x + \\tan x)", a: "y' = \\sec x" },
    { id: 29, q: "y = e^{x} \\sin x", a: "y' = e^x(\\sin x + \\cos x)" },
    { id: 30, q: "y = \\frac{x}{\\ln x}", a: "y' = \\frac{\\ln x - 1}{(\\ln x)^2}" },
    { id: 31, q: "y = (x^2+1)e^x", a: "y' = (x^2+2x+1)e^x" },
    { id: 32, q: "y = \\sqrt{\\ln x}", a: "y' = \\frac{1}{2x \\sqrt{\\ln x}}" },
    { id: 33, q: "y = \\sin(x^2) e^x", a: "y' = e^x(2x \\cos(x^2) + \\sin(x^2))" },
    { id: 34, q: "y = \\frac{\\tan x}{x}", a: "y' = \\frac{x \\sec^2 x - \\tan x}{x^2}" },
    { id: 35, q: "y = \\ln(\\ln x)", a: "y' = \\frac{1}{x \\ln x}" },
    { id: 36, q: "y = e^{3x} \\cos(4x)", a: "y' = e^{3x}(3 \\cos 4x - 4 \\sin 4x)" },
    { id: 37, q: "y = \\arccos(x/2)", a: "y' = -\\frac{1}{\\sqrt{4-x^2}}" },
    { id: 38, q: "y = \\sqrt{1-x^2}", a: "y' = -\\frac{x}{\\sqrt{1-x^2}}" },
    { id: 39, q: "y = \\frac{e^x+1}{e^x-1}", a: "y' = -\\frac{2e^x}{(e^x-1)^2}" },
    { id: 40, q: "y = x^2 \\ln(x^2)", a: "y' = 2x(1 + 2\\ln x)" },
    { id: 41, q: "y = \\tan(e^x)", a: "y' = e^x \\sec^2(e^x)" },
    { id: 42, q: "y = \\ln(x^3+2x+1)", a: "y' = \\frac{3x^2+2}{x^3+2x+1}" },
    { id: 43, q: "y = \\sin(x) \\cos(x)", a: "y' = \\cos(2x)" },
    { id: 44, q: "y = e^{x^3}", a: "y' = 3x^2 e^{x^3}" },
    { id: 45, q: "y = \\frac{1}{x^2+1}", a: "y' = -\\frac{2x}{(x^2+1)^2}" },
    { id: 46, q: "y = (1+\\sin x)^2", a: "y' = 2(1+\\sin x)\\cos x" },
    { id: 47, q: "y = \\ln(\\sqrt{x})", a: "y' = \\frac{1}{2x}" },
    { id: 48, q: "y = \\sqrt{\\tan x}", a: "y' = \\frac{\\sec^2 x}{2\\sqrt{\\tan x}}" },
    { id: 49, q: "y = \\csc(x^2)", a: "y' = -2x \\csc(x^2) \\cot(x^2)" },
    { id: 50, q: "y = x \\arctan x", a: "y' = \\arctan x + \\frac{x}{1+x^2}" }
    ];

    let sprintTime = 0, sprintInterval, startTime;
    let solvedCount = 0, penaltyTime = 0, sprintQuestions = [];
    let masteredIds = JSON.parse(localStorage.getItem("m2_mastered")) || [];

    window.onload = () => {
        displayLeaderboard();
        updateMasteryUI();
    };

    function updateMasteryUI() {
        document.getElementById("masteryDisplay").textContent = `Mastery: ${masteredIds.length} / ${pool.length} Unique Questions`;
        if (masteredIds.length === pool.length && pool.length > 0) {
            document.getElementById("masteryDisplay").style.color = "var(--correct)";
            document.getElementById("masteryDisplay").textContent += " - POOL EXHAUSTED!";
        }
    }

    function startSprint() {
        solvedCount = 0;
        penaltyTime = 0;
        
        // SHUFFLE LOGIC:
        // We pick 10 random questions. 
        sprintQuestions = [...pool].sort(() => Math.random() - 0.5).slice(0, 10);
        
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("revealBtn").style.display = "block";
        document.getElementById("display").style.color = "var(--accent)";
        
        startTime = Date.now();
        sprintInterval = setInterval(updateTimer, 10);
        loadQuestion();
    }

    function updateTimer() {
        sprintTime = (Date.now() - startTime) / 1000 + penaltyTime;
        document.getElementById("display").textContent = sprintTime.toFixed(2);
    }

    function loadQuestion() {
        const q = sprintQuestions[solvedCount];
        const isNew = !masteredIds.includes(q.id);
        
        document.getElementById("progressDisplay").textContent = `Q${solvedCount + 1} / 10`;
        document.getElementById("questionText").innerHTML = (isNew ? "<span style='color:var(--accent); font-size:0.7rem;'>NEW!</span><br>" : "") + "\\[ " + q.q + " \\]";
        document.getElementById("answerText").innerHTML = "\\[ " + q.a + " \\]";
        
        document.getElementById("answerText").style.display = "none";
        document.getElementById("scoreButtons").style.display = "none";
        document.getElementById("revealBtn").style.display = "block";

        if (window.MathJax) MathJax.typesetPromise();
    }

    function toggleAnswer() {
        document.getElementById("answerText").style.display = "block";
        document.getElementById("scoreButtons").style.display = "flex";
        document.getElementById("revealBtn").style.display = "none";
        if (window.MathJax) MathJax.typesetPromise();
    }

    function handleResult(isCorrect) {
        const currentQ = sprintQuestions[solvedCount];
        
        if (isCorrect) {
            // Track mastery if correct
            if (!masteredIds.includes(currentQ.id)) {
                masteredIds.push(currentQ.id);
                localStorage.setItem("m2_mastered", JSON.stringify(masteredIds));
                updateMasteryUI();
            }
        } else {
            penaltyTime += 5;
            flashTimer();
        }
        
        solvedCount++;
        if (solvedCount < 10) {
            loadQuestion();
        } else {
            finishSprint();
        }
    }

    function flashTimer() {
        const t = document.getElementById("display");
        t.style.color = "var(--wrong)";
        setTimeout(() => t.style.color = "var(--accent)", 400);
    }

    function finishSprint() {
        clearInterval(sprintInterval);
        const finalTime = sprintTime.toFixed(2);
        
        setTimeout(() => {
            const name = prompt(`Sprint Finished!\nTime: ${finalTime}s\nMastery: ${masteredIds.length}/${pool.length}\nEnter Name:`) || "Player";
            saveScore(name, finalTime);
            document.getElementById("startBtn").style.display = "block";
            document.getElementById("startBtn").textContent = "NEW SPRINT";
            document.getElementById("revealBtn").style.display = "none";
            document.getElementById("scoreButtons").style.display = "none";
        }, 100);
    }

    function saveScore(name, time) {
        let lb = JSON.parse(localStorage.getItem("m2_speedrun_v3")) || [];
        lb.push({ name: name, time: parseFloat(time) });
        lb.sort((a, b) => a.time - b.time);
        localStorage.setItem("m2_speedrun_v3", JSON.stringify(lb.slice(0, 5)));
        displayLeaderboard();
    }

    function displayLeaderboard() {
        const lb = JSON.parse(localStorage.getItem("m2_speedrun_v3")) || [];
        const container = document.getElementById("leaderboardList");
        container.innerHTML = lb.length ? "" : "<div style='text-align:center; opacity:0.5; font-size:0.8rem;'>No runs yet</div>";
        lb.forEach((e, i) => {
            container.innerHTML += `<div class="lb-item"><span>${i+1}. ${e.name}</span><strong>${e.time.toFixed(2)}s</strong></div>`;
        });
    }
</script>
</body>
</html>
